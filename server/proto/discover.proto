syntax = "proto3";

package music.discover.v1;

// Recommendations / Discover (Phase 11). Behavioral shelves derived from the
// caller's play history + favorites + the library graph. `GetHome` is
// personalized (per-user; SECRET_KEY rejected). `GetRadio` returns a track
// queue seeded from an artist or album (library-derived; any authed identity).
// Slim entity messages (own copies, like favorite's FavAlbum/FavTrack) avoid a
// cross-proto import.
service DiscoverService {
  rpc GetHome(GetHomeRequest) returns (GetHomeResponse);
  rpc GetRadio(GetRadioRequest) returns (GetRadioResponse);
  // Acoustic "sounds like this" — the seed track's nearest neighbors (Phase 12).
  rpc GetSimilarTracks(GetSimilarRequest) returns (GetRadioResponse);
  // Spotify-style playlist recommendations: tracks similar to the whole
  // playlist (aggregated over its current songs), excluding the seeds.
  rpc RecommendForPlaylist(RecommendForPlaylistRequest) returns (GetRadioResponse);
  // Fingerprint analysis status (any authed user, read-only).
  rpc FingerprintStatus(FingerprintStatusRequest) returns (FingerprintStatusResponse);
  // Trigger an analysis pass on demand (Manager+).
  rpc FingerprintScan(FingerprintScanRequest) returns (FingerprintStatusResponse);
}

message GetHomeRequest {}

// A titled album shelf.
message DiscoverSection {
  string id = 1;     // stable key, e.g. "recently_added"
  string title = 2;  // display title
  repeated DiscAlbum albums = 3;
}
message GetHomeResponse { repeated DiscoverSection sections = 1; }

// Provide exactly one seed. Precedence server-side: track (acoustic) → artist →
// album. The client sends one.
message GetRadioRequest {
  string seed_artist_id = 1;
  string seed_album_id = 2;
  // Acoustic "sounds like" seed (Phase 12). Falls back to behavioral radio
  // (the track's artist) when the seed has no embedding yet.
  string seed_track_id = 3;
}
message GetRadioResponse { repeated DiscTrack tracks = 1; }

// "Sounds like this" shelf (Phase 12).
message GetSimilarRequest {
  string track_id = 1;
  int32 limit = 2; // 0 = server default
}

// Playlist recommendations (Phase 12). The client passes the playlist's current
// track ids as seeds; recommendations are based on (and exclude) them.
message RecommendForPlaylistRequest {
  repeated string seed_track_ids = 1;
  int32 limit = 2; // 0 = server default pool size
}

message FingerprintStatusRequest {}
message FingerprintScanRequest {}
message FingerprintStatusResponse {
  int64 analyzed = 1;        // embeddings stored for the current model
  int64 total = 2;           // total tracks in the library
  string model_version = 3;  // current extractor id (e.g. "dsp-v1")
  bool enabled = 4;          // whether the analysis subsystem is configured on
  int64 loudness_measured = 5; // tracks with a measured loudness (Phase 16)
  bool loudness_enabled = 6;   // whether loudness normalization is on
}

message DiscAlbum {
  string id = 1;
  string artist_id = 2;
  string title = 3;
  int32 release_year = 4; // 0 = unknown
  string cover_path = 5;  // empty when unset
  int64 storage_bytes = 6;
}

message DiscTrack {
  string id = 1;
  string album_id = 2;
  string artist_id = 3;
  string title = 4;
  int32 track_no = 5;
  int32 disc_no = 6;
  int64 duration_ms = 7;
  string codec = 8;
  int32 bitrate_kbps = 9;
  string file_path = 10;
  int64 file_size = 11;
  string metadata_json = 12;
  bool is_single_release = 13;
  int32 sample_rate_hz = 14;
  int32 bit_depth = 15;
  int32 channels = 16;
  // Loudness normalization (Phase 16). `optional` because 0.0 is valid.
  optional float loudness_lufs = 17;
  optional float loudness_peak = 18;
  optional float album_loudness_lufs = 19;
}
