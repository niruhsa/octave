syntax = "proto3";

package music.playlist.v1;

// Playlist CRUD + track ordering. Reads: any authed user. Mutations are
// gated to the playlist's owner or Manager+. Every mutation writes a
// `playlist.*` audit_log entry.
service PlaylistService {
  rpc CreatePlaylist(CreatePlaylistRequest) returns (Playlist);
  rpc GetPlaylist(GetPlaylistRequest) returns (PlaylistWithTracks);
  rpc RenamePlaylist(RenamePlaylistRequest) returns (Playlist);
  rpc DeletePlaylist(DeletePlaylistRequest) returns (DeleteResponse);

  rpc ListMyPlaylists(ListMyPlaylistsRequest) returns (ListPlaylistsResponse);
  rpc ListPlaylistsForOwner(ListPlaylistsForOwnerRequest) returns (ListPlaylistsResponse);

  rpc ListPlaylistTracks(ListPlaylistTracksRequest) returns (ListPlaylistTracksResponse);
  rpc AddPlaylistTrack(AddPlaylistTrackRequest) returns (PlaylistTrack);
  rpc RemovePlaylistTrack(RemovePlaylistTrackRequest) returns (DeleteResponse);
  rpc ReorderPlaylistTrack(ReorderPlaylistTrackRequest) returns (ReorderResponse);
}

// ---------------------------------------------------------------------------
// Entities
// ---------------------------------------------------------------------------

message Playlist {
  string id = 1;
  string owner_id = 2;
  string name = 3;
  string created_at = 4;
  string updated_at = 5;
}

message PlaylistTrack {
  string playlist_id = 1;
  string track_id = 2;
  int32 position = 3;          // 1-based, contiguous
  string added_at = 4;
}

message PlaylistWithTracks {
  Playlist playlist = 1;
  repeated PlaylistTrack tracks = 2;
}

message DeleteResponse { bool deleted = 1; }
message ReorderResponse { bool moved = 1; }

// ---- Requests/responses ----

message CreatePlaylistRequest { string name = 1; }
message GetPlaylistRequest { string id = 1; }
message RenamePlaylistRequest {
  string id = 1;
  string name = 2;
}
message DeletePlaylistRequest { string id = 1; }

message ListMyPlaylistsRequest {}
message ListPlaylistsForOwnerRequest { string owner_id = 1; }
message ListPlaylistsResponse {
  repeated Playlist playlists = 1;
  int64 total = 2;
}

message ListPlaylistTracksRequest { string playlist_id = 1; }
message ListPlaylistTracksResponse {
  repeated PlaylistTrack tracks = 1;
  int64 total = 2;
}

message AddPlaylistTrackRequest {
  string playlist_id = 1;
  string track_id = 2;
  // 0 = append; otherwise insert at this 1-based position (clamped server-side).
  int32 position = 3;
}
message RemovePlaylistTrackRequest {
  string playlist_id = 1;
  int32 position = 2;          // 1-based
}
message ReorderPlaylistTrackRequest {
  string playlist_id = 1;
  int32 from_position = 2;     // 1-based
  int32 to_position = 3;       // 1-based
}
