syntax = "proto3";

package music.library.v1;

// Catalog CRUD: artists, albums, tracks. Reads: any authed user. Mutations:
// Manager+. Every mutating RPC writes an audit_log entry server-side.
service LibraryService {
  // Artists
  rpc CreateArtist(CreateArtistRequest) returns (Artist);
  rpc GetArtist(GetArtistRequest) returns (Artist);
  rpc UpdateArtist(UpdateArtistRequest) returns (Artist);
  rpc DeleteArtist(DeleteArtistRequest) returns (DeleteResponse);
  rpc ListArtists(ListArtistsRequest) returns (ListArtistsResponse);
  rpc SearchArtists(SearchRequest) returns (ListArtistsResponse);

  // Albums
  rpc CreateAlbum(CreateAlbumRequest) returns (Album);
  rpc GetAlbum(GetAlbumRequest) returns (Album);
  rpc UpdateAlbum(UpdateAlbumRequest) returns (Album);
  rpc DeleteAlbum(DeleteAlbumRequest) returns (DeleteResponse);
  rpc ListAlbumsByArtist(ListAlbumsByArtistRequest) returns (ListAlbumsResponse);
  rpc SearchAlbums(SearchRequest) returns (ListAlbumsResponse);

  // Tracks
  rpc CreateTrack(CreateTrackRequest) returns (Track);
  rpc GetTrack(GetTrackRequest) returns (Track);
  rpc UpdateTrack(UpdateTrackRequest) returns (Track);
  rpc DeleteTrack(DeleteTrackRequest) returns (DeleteResponse);
  rpc ListTracksByAlbum(ListTracksByAlbumRequest) returns (ListTracksResponse);
  rpc SearchTracks(SearchRequest) returns (ListTracksResponse);

  // Library storage breakdown (homepage widget). Any authed user.
  rpc GetLibraryStorage(GetLibraryStorageRequest) returns (LibraryStorage);

  // Library scan: index files on disk into the DB.
  rpc ScanLibrary(ScanRequest) returns (ScanResponse);
  // Rescan all existing tracks: re-read tags + re-measure duration, update DB.
  rpc RescanLibrary(RescanRequest) returns (RescanResponse);

  // Metadata & Artwork (Phase 7)
  // Opt-in metadata edit (Manager+). Optionally writes back to file tags.
  rpc EditTrackMetadata(EditTrackMetadataRequest) returns (Track);
  // Fetch + cache album artwork from an external source (Manager+).
  rpc FetchAlbumArtwork(FetchAlbumArtworkRequest) returns (FetchAlbumArtworkResponse);

  // Merge + aliases (Phase 10). All Manager+, all audited.
  // Merge the duplicate into the survivor (re-points its catalog, preserves
  // every spelling as an alias, deletes the duplicate). Returns the survivor.
  rpc MergeArtists(MergeRequest) returns (Artist);
  rpc MergeAlbums(MergeRequest) returns (Album);
  // Move a track to another album, optionally flagging it a single release.
  rpc MoveTrack(MoveTrackRequest) returns (Track);
  // Set an album's classification (album / ep / single). A single album needs
  // at least one track flagged is_single_release; single_track_id (optional)
  // flags the chosen main single before the invariant is checked.
  rpc SetAlbumType(SetAlbumTypeRequest) returns (Album);
  // Toggle a track's single-release flag in place.
  rpc SetTrackSingleRelease(SetSingleReleaseRequest) returns (Track);
  // Artist alias editing. Each returns the refreshed Artist.
  rpc ListArtistAliases(GetArtistRequest) returns (ListAliasesResponse);
  rpc AddArtistAlias(AddArtistAliasRequest) returns (Artist);
  rpc RemoveArtistAlias(RemoveAliasRequest) returns (Artist);
  rpc SetPrimaryArtistAlias(SetPrimaryAliasRequest) returns (Artist);
  // Album alias editing. Each returns the refreshed Album.
  rpc ListAlbumAliases(GetAlbumRequest) returns (ListAliasesResponse);
  rpc AddAlbumAlias(AddAlbumAliasRequest) returns (Album);
  rpc RemoveAlbumAlias(RemoveAliasRequest) returns (Album);
  rpc SetPrimaryAlbumAlias(SetPrimaryAliasRequest) returns (Album);
  // Track alias editing (alternate title spellings). Each mutation returns the
  // refreshed Track (with its aliases populated).
  rpc ListTrackAliases(GetTrackRequest) returns (ListAliasesResponse);
  rpc AddTrackAlias(AddTrackAliasRequest) returns (Track);
  rpc RemoveTrackAlias(RemoveAliasRequest) returns (Track);
  rpc SetPrimaryTrackAlias(SetPrimaryAliasRequest) returns (Track);
}

// ---------------------------------------------------------------------------
// Entities
// ---------------------------------------------------------------------------

// One known spelling of an artist / album. `language` is the inferred or
// declared label (e.g. "English", "Korean"); empty = unknown/infer.
message AliasInfo {
  string id = 1;
  string name = 2;             // the spelling (artist name or album title)
  string sort_name = 3;        // artists only; empty for albums
  string language = 4;
  bool is_primary = 5;
}

message Artist {
  string id = 1;
  string name = 2;
  string sort_name = 3;
  string created_at = 4;       // RFC3339
  string updated_at = 5;
  string image_path = 6;       // server-side path; empty = no image
  // Every known spelling. Populated on single-entity reads/mutations only
  // (empty on list/search rows).
  repeated AliasInfo aliases = 7;
  // Sum of the on-disk bytes of every track owned by this artist.
  int64 storage_bytes = 8;
}

message Album {
  string id = 1;
  string artist_id = 2;
  string title = 3;
  int32 release_year = 4;      // 0 = unknown
  string cover_path = 5;
  string created_at = 6;
  string updated_at = 7;
  repeated AliasInfo aliases = 8;  // see Artist.aliases
  // Sum of the on-disk bytes of every track on this album.
  int64 storage_bytes = 9;
  // Classification: "album" | "ep" | "single".
  string album_type = 10;
}

message Track {
  string id = 1;
  string album_id = 2;
  string artist_id = 3;
  string title = 4;
  int32 track_no = 5;          // 0 = unknown
  int32 disc_no = 6;           // 0 = unknown
  int64 duration_ms = 7;
  string codec = 8;
  int32 bitrate_kbps = 9;      // 0 = unknown
  string file_path = 10;
  int64 file_size = 11;        // 0 = unknown
  string metadata_json = 12;
  string created_at = 13;
  string updated_at = 14;
  bool is_single_release = 15; // a single release within its album
  // Audio-quality detail probed at ingest/rescan. 0 = unknown.
  int32 sample_rate_hz = 16;
  int32 bit_depth = 17;
  int32 channels = 18;
  // Alternate title spellings (populated on single-entity reads only).
  repeated AliasInfo aliases = 19;
}

// The library-storage breakdown (homepage widget). `misc` shown in the UI is
// `artwork_bytes + other_bytes`. Byte sums + counts; `computed_at` is RFC3339.
message LibraryStorage {
  int64 music_bytes = 1;
  int64 podcast_bytes = 2;
  int64 artwork_bytes = 3;
  int64 other_bytes = 4;
  int64 total_bytes = 5;
  int64 track_count = 6;
  int64 album_count = 7;
  int64 artist_count = 8;
  int64 podcast_count = 9;
  int64 episode_count = 10;
  string computed_at = 11;
}

message GetLibraryStorageRequest {}

// ---------------------------------------------------------------------------
// Common requests/responses
// ---------------------------------------------------------------------------

message DeleteResponse { bool deleted = 1; }

message Pagination {
  int64 limit = 1;             // capped server-side
  int64 offset = 2;
}

message SearchRequest {
  string query = 1;
  Pagination page = 2;
}

// ---- Artist ops ----

message CreateArtistRequest {
  string name = 1;
  string sort_name = 2;
}
message GetArtistRequest { string id = 1; }
message UpdateArtistRequest {
  string id = 1;
  string name = 2;
  string sort_name = 3;
}
message DeleteArtistRequest { string id = 1; }
message ListArtistsRequest { Pagination page = 1; }
message ListArtistsResponse {
  repeated Artist artists = 1;
  int64 total = 2;
}

// ---- Album ops ----

message CreateAlbumRequest {
  string artist_id = 1;
  string title = 2;
  int32 release_year = 3;
  string cover_path = 4;
}
message GetAlbumRequest { string id = 1; }
message UpdateAlbumRequest {
  string id = 1;
  string title = 2;
  int32 release_year = 3;
  string cover_path = 4;
}
message DeleteAlbumRequest { string id = 1; }
message ListAlbumsByArtistRequest { string artist_id = 1; }
message ListAlbumsResponse {
  repeated Album albums = 1;
  int64 total = 2;
}

// ---- Track ops ----

message CreateTrackRequest {
  string album_id = 1;
  string artist_id = 2;
  string title = 3;
  int32 track_no = 4;
  int32 disc_no = 5;
  int64 duration_ms = 6;
  string codec = 7;
  int32 bitrate_kbps = 8;
  string file_path = 9;
  int64 file_size = 10;
  string metadata_json = 11;
}
message GetTrackRequest { string id = 1; }
message UpdateTrackRequest {
  string id = 1;
  string title = 2;
  int32 track_no = 3;
  int32 disc_no = 4;
  string metadata_json = 5;
}
message DeleteTrackRequest { string id = 1; }
message ListTracksByAlbumRequest { string album_id = 1; }
message ListTracksResponse {
  repeated Track tracks = 1;
  int64 total = 2;
}

// ---- Scan ----

message ScanRequest {
  string root_path = 1;        // empty -> use LIBRARY_PATH from config
}
message ScanResponse {
  int64 tracks_added = 1;
  int64 tracks_skipped = 2;
  int64 errors = 3;
}

message RescanRequest {
  // When true, re-read file tags and update title/track_no/etc. too.
  // When false (default), only re-measure duration.
  bool full_metadata = 1;
}
message RescanResponse {
  int64 tracks_checked = 1;
  int64 tracks_updated = 2;
  int64 errors = 3;
}

// ---- Metadata & Artwork ----

// Field-presence semantics: optional scalars distinguish "unset" (leave
// unchanged) from an explicit value.
message EditTrackMetadataRequest {
  string id = 1;
  optional string title = 2;
  optional int32 track_no = 3;
  optional int32 disc_no = 4;
  optional string metadata_json = 5;
  // Year is written back to the file tag only (not a track DB column).
  optional int32 year = 6;
}

message FetchAlbumArtworkRequest { string album_id = 1; }
message FetchAlbumArtworkResponse {
  bool found = 1;
  string cover_path = 2;       // empty when found == false
}

// ---- Merge + aliases (Phase 10) ----

// `survivor_id` is kept; `duplicate_id` is merged in and deleted.
message MergeRequest {
  string survivor_id = 1;
  string duplicate_id = 2;
}

message MoveTrackRequest {
  string track_id = 1;
  string album_id = 2;         // destination album
  bool single_release = 3;     // flag the track a single release in the dest
}

message SetSingleReleaseRequest {
  string track_id = 1;
  bool single_release = 2;
}

message SetAlbumTypeRequest {
  string album_id = 1;
  string album_type = 2;        // "album" | "ep" | "single"
  string single_track_id = 3;   // optional; "" = none (main single for a single)
}

message ListAliasesResponse { repeated AliasInfo aliases = 1; }

message AddArtistAliasRequest {
  string artist_id = 1;
  string name = 2;
  string sort_name = 3;        // optional
  string language = 4;         // optional; inferred from the name when empty
}

message AddAlbumAliasRequest {
  string album_id = 1;
  string title = 2;
  string language = 3;         // optional; inferred from the title when empty
}

message AddTrackAliasRequest {
  string track_id = 1;
  string title = 2;
  string language = 3;         // optional; inferred from the title when empty
}

// `entity_id` is the owning artist/album; `alias_id` the alias row.
message RemoveAliasRequest {
  string entity_id = 1;
  string alias_id = 2;
}
message SetPrimaryAliasRequest {
  string entity_id = 1;
  string alias_id = 2;
}
