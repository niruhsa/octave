<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <!-- viewport-fit=cover lets the app draw edge-to-edge AND exposes the
         system safe-area insets to CSS via env(safe-area-inset-*), so the
         mobile bars can pad around the status bar / gesture indicator. -->
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <title>OCTAVE</title>
    </head>

    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
